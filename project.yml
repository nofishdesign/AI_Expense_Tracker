name: LedgerAI
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
packages: {}
targets:
  LedgerAI:
    type: application
    platform: iOS
    sources:
      - path: LedgerAI/LedgerAI/LedgerAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.ledgerai
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: 用于将语音内容转为记账文本。
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于录制语音记账。
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于选择截图进行 OCR 识别。
    dependencies: []
  LedgerAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerAI/LedgerAI/LedgerAITests
    dependencies:
      - target: LedgerAI
